name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Clone target repo and deploy
        run: |
          git config --global user.email "wanda.devops@gmail.com"
          git config --global user.name "Wanda"
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/wanda-OS-dev/wanda-OS-dev.github.io.git target
          rm -rf target/*
          cp -r dist/* target/
          cd target
          git add -A
          git diff --cached --quiet || git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/wanda-OS-dev/wanda-OS-dev.github.io.git main
